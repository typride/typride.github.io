<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>AI Tools Library by Typride</title>
<script src="https://unpkg.com/vis-network@9.1.9/standalone/umd/vis-network.min.js"></script>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --bg: #0f172a; --surface: #1e293b; --border: #334155;
  --text: #e2e8f0; --text-muted: #94a3b8; --accent: #38bdf8;
}
body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
  background: var(--bg); color: var(--text); height: 100vh; overflow: hidden; }

#app { display: grid; grid-template-rows: auto 1fr; grid-template-columns: 1fr 340px;
  height: 100vh; }

header { grid-column: 1 / -1; display: flex; align-items: center; gap: 10px;
  padding: 10px 20px; background: var(--surface); border-bottom: 1px solid var(--border);
  flex-wrap: wrap; }
header h1 { font-size: 17px; font-weight: 700; white-space: nowrap; }
header h1 .ai { color: var(--accent); }
header h1 .by { font-weight: 400; font-size: 13px; color: var(--accent); opacity: 0.8; }
.stats { font-size: 12px; color: var(--text-muted); white-space: nowrap; }

#search { background: var(--bg); border: 1px solid var(--border); border-radius: 6px;
  color: var(--text); padding: 5px 10px; font-size: 13px; width: 180px; }
#search:focus { outline: none; border-color: var(--accent); }
#search::placeholder { color: var(--text-muted); }

#workflow-select { background: var(--bg); border: 1px solid var(--border); border-radius: 6px;
  color: var(--text); padding: 5px 10px; font-size: 13px; max-width: 240px; }
#workflow-select:focus { outline: none; border-color: var(--accent); }

.view-toggle { display: flex; border: 1px solid var(--border); border-radius: 6px; overflow: hidden; }
.vt-btn { background: transparent; border: none; color: var(--text-muted); padding: 5px 14px;
  font-size: 12px; font-weight: 600; cursor: pointer; transition: all 0.15s; }
.vt-btn:hover { color: var(--text); }
.vt-btn.active { background: var(--accent); color: var(--bg); }

.header-btn { background: transparent; border: 1px solid var(--border); border-radius: 6px;
  color: var(--text-muted); padding: 5px 12px; font-size: 12px; cursor: pointer;
  white-space: nowrap; transition: all 0.15s; }
.header-btn:hover { border-color: var(--accent); color: var(--accent); }

/* -- Main content area -- */
#main-content { position: relative; overflow: hidden; }
#network-container { position: absolute; inset: 0; }
#network { width: 100%; height: 100%; }
#table-container { position: absolute; inset: 0; display: none; overflow-y: auto;
  background: var(--bg); }

/* -- Graph overlays -- */
#legend { position: absolute; bottom: 12px; left: 12px; background: var(--surface);
  border: 1px solid var(--border); border-radius: 8px; padding: 8px 12px;
  display: flex; flex-wrap: wrap; gap: 6px 14px; max-width: 60%; font-size: 11px;
  pointer-events: none; z-index: 2; }
.legend-item { display: flex; align-items: center; gap: 4px; }
.legend-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }

#watermark { position: absolute; bottom: 14px; right: 14px; font-size: 11px;
  color: rgba(148,163,184,0.35); pointer-events: none; z-index: 2;
  font-weight: 600; letter-spacing: 0.02em; }

/* -- Table view -- */
#table-filter-bar { padding: 12px 20px; display: flex; gap: 8px; align-items: center;
  flex-wrap: wrap; border-bottom: 1px solid var(--border); background: var(--surface);
  position: sticky; top: 0; z-index: 3; }
.tf-select { background: var(--bg); border: 1px solid var(--border); border-radius: 6px;
  color: var(--text); padding: 5px 10px; font-size: 12px; }
.tf-select:focus { outline: none; border-color: var(--accent); }
.tf-toggle { background: transparent; border: 1px solid var(--border); border-radius: 6px;
  color: var(--text-muted); padding: 5px 12px; font-size: 12px; cursor: pointer;
  transition: all 0.15s; }
.tf-toggle:hover { border-color: var(--text-muted); }
.tf-toggle.on { background: rgba(56,189,248,0.15); border-color: var(--accent);
  color: var(--accent); }
.tf-label { font-size: 11px; color: var(--text-muted); text-transform: uppercase;
  letter-spacing: 0.04em; font-weight: 600; }
.tf-count { font-size: 11px; color: var(--text-muted); margin-left: auto; }

.tools-table { width: 100%; border-collapse: collapse; }
.tools-table th { text-align: left; padding: 10px 14px; font-weight: 600;
  font-size: 11px; text-transform: uppercase; letter-spacing: 0.04em;
  color: var(--text-muted); border-bottom: 2px solid var(--border);
  cursor: pointer; user-select: none; white-space: nowrap;
  position: sticky; top: 45px; background: var(--bg); z-index: 2; }
.tools-table th:hover { color: var(--accent); }
.tools-table th .arrow { font-size: 10px; margin-left: 3px; opacity: 0.5; }
.tools-table th.sorted .arrow { opacity: 1; color: var(--accent); }
.tools-table td { padding: 9px 14px; border-bottom: 1px solid var(--border);
  font-size: 13px; vertical-align: middle; }
.tools-table tbody tr { cursor: pointer; transition: background 0.1s; }
.tools-table tbody tr:hover { background: rgba(56,189,248,0.06); }
.tools-table tbody tr.selected { background: rgba(56,189,248,0.12); }
.t-name { font-weight: 600; color: var(--text); }
.t-cat { font-size: 11px; padding: 2px 8px; border-radius: 10px;
  font-weight: 600; white-space: nowrap; }
.t-rating { color: #fbbf24; }
.t-badge { font-size: 11px; padding: 1px 7px; border-radius: 10px; font-weight: 600; }
.t-yes { background: rgba(16,185,129,0.15); color: #34d399; }
.t-no { background: rgba(100,116,139,0.15); color: var(--text-muted); }

/* -- Sidebar -- */
#sidebar { background: var(--surface); border-left: 1px solid var(--border);
  overflow-y: auto; padding: 20px; }
.sidebar-empty { display: flex; flex-direction: column; align-items: center;
  justify-content: center; height: 100%; text-align: center; color: var(--text-muted); }
.sidebar-empty p { margin-top: 8px; font-size: 13px; }
.sidebar-hint { font-size: 11px; color: var(--text-muted); margin-top: 4px; opacity: 0.7; }

.tool-header { margin-bottom: 14px; }
.tool-name { font-size: 18px; font-weight: 700; margin-bottom: 4px; }
.tool-name a { color: var(--accent); text-decoration: none; }
.tool-name a:hover { text-decoration: underline; }
.tool-meta { display: flex; gap: 6px; flex-wrap: wrap; margin-top: 8px; }
.badge { font-size: 11px; padding: 2px 8px; border-radius: 12px; font-weight: 600; }
.badge-cat { background: rgba(255,255,255,0.1); }
.badge-status { background: rgba(56,189,248,0.15); color: var(--accent); }
.badge-price { background: rgba(16,185,129,0.15); color: #34d399; }
.badge-rating { background: rgba(245,158,11,0.15); color: #fbbf24; }
.badge-free { background: rgba(251,191,36,0.15); color: #fbbf24; }

.tool-desc { font-size: 13px; line-height: 1.6; color: var(--text-muted); margin-bottom: 14px; }
.detail-section { margin-bottom: 14px; }
.detail-section h3 { font-size: 12px; font-weight: 600; text-transform: uppercase;
  letter-spacing: 0.05em; color: var(--text-muted); margin-bottom: 5px; }
.detail-section ul { list-style: none; padding: 0; }
.detail-section li { font-size: 12px; line-height: 1.5; padding: 2px 0;
  padding-left: 13px; position: relative; }
.detail-section li::before { content: "\2022"; position: absolute; left: 0;
  color: var(--accent); }
.pro li::before { color: #34d399; }
.con li::before { color: #f87171; }
.conn-link { color: var(--accent); text-decoration: none; cursor: pointer; }
.conn-link:hover { text-decoration: underline; }
.conn-how { color: var(--text-muted); font-size: 11px; }

.wf-panel { background: var(--bg); border: 1px solid var(--border); border-radius: 8px;
  padding: 14px; margin-top: 12px; }
.wf-panel h3 { font-size: 15px; font-weight: 700; margin-bottom: 8px; }
.wf-panel p { font-size: 12px; color: var(--text-muted); line-height: 1.5; margin-bottom: 10px; }
.wf-step { display: flex; gap: 10px; padding: 7px 0; border-top: 1px solid var(--border); }
.wf-step-num { width: 20px; height: 20px; border-radius: 50%; background: var(--accent);
  color: var(--bg); font-size: 11px; font-weight: 700; display: flex; align-items: center;
  justify-content: center; flex-shrink: 0; margin-top: 2px; }
.wf-step-content { flex: 1; }
.wf-step-name { font-size: 12px; font-weight: 600; }
.wf-step-tools { font-size: 11px; color: var(--accent); }
.wf-step-desc { font-size: 11px; color: var(--text-muted); margin-top: 2px; }

.filter-section { margin-bottom: 14px; }
.filter-section h3 { font-size: 12px; font-weight: 600; text-transform: uppercase;
  letter-spacing: 0.05em; color: var(--text-muted); margin-bottom: 6px; }
.filter-btn { display: inline-flex; align-items: center; gap: 4px; font-size: 11px;
  padding: 3px 9px; border-radius: 12px; border: 1px solid var(--border);
  background: transparent; color: var(--text); cursor: pointer; margin: 2px;
  transition: all 0.15s; }
.filter-btn:hover { border-color: var(--text-muted); }
.filter-btn.active { background: rgba(255,255,255,0.1); border-color: var(--text); }
.filter-btn.isolated { background: rgba(56,189,248,0.2); border-color: var(--accent); color: #fff; }
.filter-dot { width: 7px; height: 7px; border-radius: 50%; }
.filter-all-btn { font-size: 11px; padding: 3px 10px; border-radius: 12px;
  border: 1px solid var(--accent); background: transparent; color: var(--accent);
  cursor: pointer; margin: 2px 2px 6px 0; transition: all 0.15s; }
.filter-all-btn:hover { background: rgba(56,189,248,0.15); }

@media (max-width: 768px) {
  #app { grid-template-columns: 1fr; grid-template-rows: auto 1fr auto; }
  #sidebar { max-height: 40vh; border-left: none; border-top: 1px solid var(--border); }
  header { gap: 6px; }
  #search, #workflow-select { width: 100%; max-width: 100%; }
}
</style>
</head>
<body>
<div id="app">

    <h1><span class="ai">AI</span> Tools Library <span class="by">by Typride</span></h1>

        <tbody id="table-body"></tbody>

  </div>
  <div id="sidebar">
    <div class="sidebar-empty" id="sidebar-empty">

        <circle cx="12" cy="12" r="10"/><path d="M12 8v4m0 4h.01"/>
      </svg>
      <p>Click a tool to see details.</p>
      <p class="sidebar-hint">Click a category to isolate it. Click again to show all.</p>
      <div class="filter-section" id="filters" style="margin-top: 16px; text-align: left;"></div>
    </div>
    <div id="sidebar-content" style="display:none;"></div>
  </div>
</div>

function highlightWorkflow(wf) {
  activeWorkflow = wf;
  visNodes.forEach(n => {
    if (n.id.startsWith('_lbl_')) return;
    const inWf = wf.toolIds.includes(n.id);
    visNodes.update({ id: n.id, opacity: inWf ? 1 : 0.1,
      font: { color: inWf ? '#e2e8f0' : 'rgba(226,232,240,0.1)', size: 12,
        face: '-apple-system, sans-serif' } });
  });
  visEdges.forEach(e => {
    const hit = wf.stepEdges.some(se =>
      (se.from === e.from && se.to === e.to) || (se.from === e.to && se.to === e.from));
    visEdges.update({ id: e.id,
      color: hit ? { color: '#38bdf8' } : { color: 'rgba(71,85,105,0.06)' },
      width: hit ? 3.5 : 0.5, dashes: hit ? [8, 4] : false });
  });
  showWorkflowPanel(wf);

function applyVisibility() {

    visNodes.update({ id: n.id, opacity: vis ? 1 : 0.07, borderWidth: 2,

        face: '-apple-system, sans-serif' } });
  });
  visEdges.forEach(e => {
    visEdges.update({ id: e.id,
      color: { color: '#475569', highlight: '#38bdf8', hover: '#64748b' },
      width: 1.5, dashes: false });
  });
}

function highlightNeighborhood(nodeId) {
  const nbrs = adjacency[nodeId] || new Set();
  visNodes.forEach(n => {
    if (n.id.startsWith('_lbl_')) return;
    const center = n.id === nodeId;
    const nbr = nbrs.has(n.id);
    const lit = center || nbr;
    visNodes.update({ id: n.id, opacity: lit ? 1 : 0.07, borderWidth: center ? 4 : 2,
      font: { color: lit ? '#e2e8f0' : 'rgba(226,232,240,0.07)', size: 12,
        face: '-apple-system, sans-serif' } });
  });
  visEdges.forEach(e => {
    const conn = (e.from === nodeId || e.to === nodeId);
    visEdges.update({ id: e.id,
      color: conn ? { color: '#38bdf8' } : { color: 'rgba(71,85,105,0.04)' },
      width: conn ? 3 : 0.5 });
  });
}

    resetAll();
    return;
  }
  const id = params.nodes[0];
  if (id.startsWith('_lbl_')) return;
  const n = nodeMap[id];
  if (!n) return;
  highlightedNode = id;
  activeWorkflow = null;
  wfSelect.value = '';
  highlightNeighborhood(id);
  showToolDetail(n);
});

/* ══════════════════════════════════════════
   TABLE VIEW
   ══════════════════════════════════════════ */
let sortCol = 'label';
let sortAsc = true;
let freeOnly = false;

/* Populate filter dropdowns */
const tfCat = document.getElementById('tf-cat');
DATA.categories.forEach(c => {
  const o = document.createElement('option'); o.value = c.slug;
  o.textContent = c.name + ' (' + c.count + ')'; tfCat.appendChild(o);
});
const tfPricing = document.getElementById('tf-pricing');
const pricingModels = [...new Set(DATA.nodes.map(n => n.pricingModel).filter(Boolean))].sort();
pricingModels.forEach(m => {
  const o = document.createElement('option'); o.value = m; o.textContent = m; tfPricing.appendChild(o);
});

function buildTableRows() {
  let rows = DATA.nodes.slice();
  /* Filter */
  const catF = tfCat.value;
  const prF = tfPricing.value;
  const ratF = parseFloat(document.getElementById('tf-rating').value) || 0;
  const q = document.getElementById('search').value.toLowerCase().trim();

  if (catF) rows = rows.filter(r => r.category === catF);
  if (prF) rows = rows.filter(r => r.pricingModel === prF);
  if (freeOnly) rows = rows.filter(r => r.freeTier);
  if (ratF) rows = rows.filter(r => (r.rating || 0) >= ratF);
  if (q) rows = rows.filter(r =>
    r.label.toLowerCase().includes(q) || r.category.toLowerCase().includes(q) ||
    r.description.toLowerCase().includes(q) || r.tags.some(t => t.toLowerCase().includes(q)));

  /* Sort */
  rows.sort((a, b) => {
    let va = a[sortCol], vb = b[sortCol];
    if (sortCol === 'freeTier') { va = va ? 1 : 0; vb = vb ? 1 : 0; }
    if (va == null) va = sortCol === 'rating' ? 0 : '';
    if (vb == null) vb = sortCol === 'rating' ? 0 : '';
    if (typeof va === 'string') { va = va.toLowerCase(); vb = (vb || '').toLowerCase(); }
    if (va < vb) return sortAsc ? -1 : 1;
    if (va > vb) return sortAsc ? 1 : -1;
    return 0;
  });

  const tbody = document.getElementById('table-body');
  tbody.innerHTML = '';
  rows.forEach(n => {
    const tr = document.createElement('tr');
    tr.dataset.id = n.id;
    if (highlightedNode === n.id) tr.classList.add('selected');
    const catColor = n.color;
    const rating = n.rating ? '\u2605 ' + n.rating : '\u2014';
    const pricing = n.pricingModel ? n.pricingModel + (n.startingPrice ? ' \xb7 ' + n.startingPrice : '') : '\u2014';
    const free = n.freeTier ? '<span class="t-badge t-yes">Yes</span>' : '<span class="t-badge t-no">No</span>';
    tr.innerHTML =
      '<td class="t-name">' + esc(n.label) + '</td>' +
      '<td><span class="t-cat" style="background:' + catColor + '22;color:' + catColor + '">' + esc(n.categoryName) + '</span></td>' +
      '<td class="t-rating">' + rating + '</td>' +
      '<td>' + esc(pricing) + '</td>' +
      '<td>' + free + '</td>' +
      '<td>' + n.connectionCount + '</td>' +
      '<td><span class="t-badge" style="background:rgba(56,189,248,0.12);color:var(--accent)">' + esc(n.status) + '</span></td>';
    tr.addEventListener('click', function() {
      highlightedNode = n.id;
      showToolDetail(n);
      document.querySelectorAll('#table-body tr.selected').forEach(r => r.classList.remove('selected'));
      this.classList.add('selected');
    });
    tbody.appendChild(tr);
  });
  document.getElementById('tf-count').textContent = rows.length + ' of ' + DATA.nodes.length + ' tools';
}

/* Sort headers */
document.querySelectorAll('.tools-table th').forEach(th => {
  th.addEventListener('click', function() {
    const col = this.dataset.col;
    if (!col) return;
    if (sortCol === col) { sortAsc = !sortAsc; }
    else { sortCol = col; sortAsc = true; }
    document.querySelectorAll('.tools-table th').forEach(h => {
      h.classList.remove('sorted');
      h.querySelector('.arrow').textContent = '';
    });
    this.classList.add('sorted');
    this.querySelector('.arrow').textContent = sortAsc ? '\u25b2' : '\u25bc';
    buildTableRows();
  });
});

/* Table filters */
tfCat.addEventListener('change', buildTableRows);
tfPricing.addEventListener('change', buildTableRows);
document.getElementById('tf-rating').addEventListener('change', buildTableRows);
document.getElementById('tf-free').addEventListener('click', function() {
  freeOnly = !freeOnly;
  this.classList.toggle('on', freeOnly);
  buildTableRows();
});

/* Initial table build */
buildTableRows();

/* ══════════════════════════════════════════
   VIEW TOGGLE
   ══════════════════════════════════════════ */
document.querySelectorAll('.vt-btn').forEach(btn => {
  btn.addEventListener('click', function() {
    const view = this.dataset.view;
    if (view === currentView) return;
    currentView = view;
    document.querySelectorAll('.vt-btn').forEach(b => b.classList.remove('active'));
    this.classList.add('active');
    document.getElementById('network-container').style.display = view === 'graph' ? 'block' : 'none';
    document.getElementById('table-container').style.display = view === 'table' ? 'block' : 'none';
    if (view === 'table') buildTableRows();
    if (view === 'graph') network.redraw();
  });
});

/* ══════════════════════════════════════════
   SHARED: SIDEBAR, SEARCH, RESET
   ══════════════════════════════════════════ */
function showDefaultSidebar() {
  document.getElementById('sidebar-content').style.display = 'none';
  document.getElementById('sidebar-empty').style.display = 'flex';
}

function showToolDetail(n) {
  const el = document.getElementById('sidebar-content');
  let h = '<div class="tool-header">';
  h += '<div class="tool-name"><a href="' + esc(n.url) + '" target="_blank">' + esc(n.label) + ' \u2197</a></div>';
  h += '<div class="tool-meta">';
  h += '<span class="badge badge-cat" style="border-left:3px solid ' + n.color + '">' + esc(n.categoryName) + '</span>';
  h += '<span class="badge badge-status">' + esc(n.status) + '</span>';
  if (n.rating) h += '<span class="badge badge-rating">\u2605 ' + n.rating + '</span>';
  if (n.pricingModel) h += '<span class="badge badge-price">' + esc(n.pricingModel) +
    (n.startingPrice ? ' \xb7 ' + esc(n.startingPrice) : '') + '</span>';
  if (n.freeTier) h += '<span class="badge badge-free">Free tier</span>';
  h += '</div></div>';
  h += '<div class="tool-desc">' + esc(n.description) + '</div>';
  const nbrs = adjacency[n.id] || new Set();
  if (nbrs.size) {
    h += '<div class="detail-section"><h3>Connects To (' + nbrs.size + ')</h3><ul>';
    nbrs.forEach(nid => {
      const p = nodeMap[nid]; if (!p) return;
      const how = edgeInfo[n.id + '|' + nid] || '';
      h += '<li><a class="conn-link" onclick="focusNode(\'' + esc(nid) + '\');return false;" href="#">' +
        esc(p.label) + '</a>';
      if (how) h += ' <span class="conn-how">\u2014 ' + esc(how) + '</span>';
      h += '</li>';
    });
    h += '</ul></div>';
  }
  if (n.useCases.length) { h += '<div class="detail-section"><h3>Use Cases</h3><ul>';
    n.useCases.forEach(u => { h += '<li>' + esc(u) + '</li>'; }); h += '</ul></div>'; }
  if (n.pros.length) { h += '<div class="detail-section pro"><h3>Pros</h3><ul>';
    n.pros.forEach(p => { h += '<li>' + esc(p) + '</li>'; }); h += '</ul></div>'; }
  if (n.cons.length) { h += '<div class="detail-section con"><h3>Cons</h3><ul>';
    n.cons.forEach(c => { h += '<li>' + esc(c) + '</li>'; }); h += '</ul></div>'; }
  const rel = DATA.workflows.filter(w => w.toolIds.includes(n.id));
  if (rel.length) {
    h += '<div class="detail-section"><h3>Used In Workflows</h3><ul>';
    rel.forEach(w => {
      h += '<li><a href="#" onclick="selectWorkflow(\'' + esc(w.slug) + '\');return false;" ' +
        'style="color:var(--accent);text-decoration:none">' + esc(w.name) + '</a></li>';
    }); h += '</ul></div>';
  }
  el.innerHTML = h; el.style.display = 'block';
  document.getElementById('sidebar-empty').style.display = 'none';
}

function showWorkflowPanel(wf) {
  const el = document.getElementById('sidebar-content');
  let h = '<div class="wf-panel"><h3>' + esc(wf.name) + '</h3>';
  h += '<p>' + esc(wf.description) + '</p>';
  wf.steps.forEach((s, i) => {
    const tools = s.tools.join(', ');
    const alts = s.alternatives.length ? ' (alt: ' + s.alternatives.join(', ') + ')' : '';
    h += '<div class="wf-step"><div class="wf-step-num">' + (i+1) + '</div>';
    h += '<div class="wf-step-content"><div class="wf-step-name">' + esc(s.name) + '</div>';
    h += '<div class="wf-step-tools">' + esc(tools + alts) + '</div>';
    h += '<div class="wf-step-desc">' + esc(s.description) + '</div></div></div>';
  });
  h += '</div>'; el.innerHTML = h; el.style.display = 'block';
  document.getElementById('sidebar-empty').style.display = 'none';
}

function focusNode(id) {
  const n = nodeMap[id]; if (!n) return;
  highlightedNode = id;
  if (currentView === 'graph') {
    highlightNeighborhood(id);
    network.focus(id, { scale: 1.1, animation: { duration: 300, easingFunction: 'easeInOutQuad' } });
  } else { buildTableRows(); }
  showToolDetail(n);
}

function selectWorkflow(slug) {
  highlightedNode = null;
  wfSelect.value = slug;
  const wf = DATA.workflows.find(w => w.slug === slug);
  if (wf) {
    if (currentView !== 'graph') {
      document.querySelectorAll('.vt-btn').forEach(b => b.classList.remove('active'));
      document.querySelector('.vt-btn[data-view="graph"]').classList.add('active');
      document.getElementById('network-container').style.display = 'block';
      document.getElementById('table-container').style.display = 'none';
      currentView = 'graph';
      network.redraw();
    }
    highlightWorkflow(wf);
  }
}

/* Search - works for both views */
const searchInput = document.getElementById('search');
searchInput.addEventListener('input', function() {
  highlightedNode = null;
  const q = this.value.toLowerCase().trim();
  if (currentView === 'graph') {
    if (!q) { applyVisibility(); return; }
    visNodes.forEach(n => {
      if (n.id.startsWith('_lbl_')) return;
      const nd = nodeMap[n.id];
      const m = nd.label.toLowerCase().includes(q) || nd.category.toLowerCase().includes(q) ||
        nd.description.toLowerCase().includes(q);
      visNodes.update({ id: n.id, opacity: m ? 1 : 0.07,
        font: { color: m ? '#e2e8f0' : 'rgba(226,232,240,0.07)', size: 12,
          face: '-apple-system, sans-serif' } });
    });
    const matches = DATA.nodes.filter(n =>
      n.label.toLowerCase().includes(q) || n.category.toLowerCase().includes(q));
    if (matches.length === 1) network.focus(matches[0].id, { scale: 1.2, animation: true });
  } else {
    buildTableRows();
  }
});

/* Category filter (sidebar) */
function buildFilters() {
  const ct = document.getElementById('filters');
  ct.innerHTML = '<h3>Filter by Category</h3>';
  const ab = document.createElement('button'); ab.className = 'filter-all-btn';
  ab.textContent = 'Show All';
  ab.addEventListener('click', function() {
    isolatedCategory = null;
    activeCategories = new Set(DATA.categories.map(c => c.slug));
    updateFilterButtons(); applyVisibility();
  });
  ct.appendChild(ab);
  DATA.categories.forEach(c => {
    const btn = document.createElement('button');
    btn.className = 'filter-btn active'; btn.dataset.cat = c.slug;
    btn.innerHTML = '<span class="filter-dot" style="background:' + c.color + '"></span>' +
      c.name + ' (' + c.count + ')';
    btn.addEventListener('click', function() {
      if (isolatedCategory === c.slug) {
        isolatedCategory = null;
        activeCategories = new Set(DATA.categories.map(cc => cc.slug));
      } else {
        isolatedCategory = c.slug;
        activeCategories = new Set([c.slug]);
      }
      updateFilterButtons(); applyVisibility();
    });
    ct.appendChild(btn);
  });
}
function updateFilterButtons() {
  document.querySelectorAll('.filter-btn').forEach(btn => {
    btn.classList.remove('active', 'isolated');
    if (isolatedCategory) { if (btn.dataset.cat === isolatedCategory) btn.classList.add('isolated'); }
    else { btn.classList.add('active'); }
  });
}
buildFilters();

/* Master reset */
function resetAll() {
  highlightedNode = null;
  activeWorkflow = null;
  isolatedCategory = null;
  activeCategories = new Set(DATA.categories.map(c => c.slug));
  wfSelect.value = '';
  searchInput.value = '';
  freeOnly = false;
  document.getElementById('tf-free').classList.remove('on');
  tfCat.value = ''; tfPricing.value = '';
  document.getElementById('tf-rating').value = '';
  updateFilterButtons();
  applyVisibility();
  showDefaultSidebar();
  if (currentView === 'graph') {
    network.fit({ animation: { duration: 300, easingFunction: 'easeInOutQuad' } });
  } else { buildTableRows(); }
}

document.getElementById('reset-btn').addEventListener('click', resetAll);

function esc(s) {
  if (!s) return '';
  const d = document.createElement('div');
  d.textContent = String(s);
  return d.innerHTML;
}
</script>
</body>
